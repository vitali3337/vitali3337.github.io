<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МК-ГРУПП | Балконы, Окна, Тамбуры под ключ в Тирасполе</title>
<meta name="description" content="Балконы под ключ Тирасполь. Металлопластиковые окна Тирасполь. Тамбуры Тирасполь. Бесплатный замер. Звоните: 777 72 4 73">
<meta name="keywords" content="балконы под ключ тирасполь, окна тирасполь, тамбуры тирасполь, металлопластиковые окна">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF6B1A;
  --orange2: #FF8C42;
  --orange-glow: rgba(255,107,26,0.18);
  --dark: #0E0F13;
  --dark2: #15171D;
  --dark3: #1C1F28;
  --dark4: #232733;
  --white: #F0EDE8;
  --muted: #7A7F8E;
  --muted2: #555A68;
  --border: rgba(255,255,255,0.06);
  --wa: #25D366;
  --vi: #7360F2;
  --tg: #29A8EB;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden;line-height:1.6}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--orange);border-radius:4px}

/* ─── NAV ─── */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:0 5%;transition:all .35s}
.nav.scrolled{background:rgba(14,15,19,.97);backdrop-filter:blur(16px);box-shadow:0 1px 0 var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;letter-spacing:3px;color:var(--orange)}
.logo span{color:var(--white);font-weight:400}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:13px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color .25s}
.nav-links a:hover{color:var(--orange)}
.nav-call{display:flex;align-items:center;gap:8px;background:var(--orange);color:#fff;font-weight:700;font-size:13px;padding:10px 22px;border-radius:3px;letter-spacing:.5px;transition:all .3s}
.nav-call:hover{background:var(--orange2);transform:translateY(-1px);box-shadow:0 6px 20px var(--orange-glow)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
.burger span{width:26px;height:2px;background:var(--orange);display:block;transition:all .3s;border-radius:2px}
.mob-menu{display:none;position:fixed;inset:0;background:rgba(14,15,19,.99);z-index:490;flex-direction:column;align-items:center;justify-content:center;gap:36px}
.mob-menu.open{display:flex}
.mob-menu a{font-family:'Oswald',sans-serif;font-size:36px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--white);transition:color .2s}
.mob-menu a:hover{color:var(--orange)}
.mob-menu-close{position:absolute;top:24px;right:5%;font-size:28px;cursor:pointer;color:var(--muted);transition:color .2s}
.mob-menu-close:hover{color:var(--orange)}

/* ─── HERO ─── */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:100px 5% 80px}
.hero-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse 90% 70% at 65% 45%,rgba(255,107,26,.09) 0%,transparent 55%),
  radial-gradient(ellipse 60% 60% at 10% 80%,rgba(255,107,26,.05) 0%,transparent 50%),
  linear-gradient(160deg,#0E0F13 0%,#131520 60%,#0E1015 100%);
  background-attachment:fixed}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,107,26,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,26,.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 80% at 60% 50%,black 20%,transparent 70%)}
.hero-content{position:relative;z-index:2;max-width:680px}
.hero-chip{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,107,26,.3);padding:8px 20px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange);margin-bottom:32px;animation:fadeUp .7s ease both}
.hero-chip::before{content:'';width:7px;height:7px;background:var(--orange);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
.hero-h1{font-family:'Oswald',sans-serif;font-size:clamp(52px,8vw,108px);line-height:.95;font-weight:700;letter-spacing:1px;animation:fadeUp .7s .1s ease both}
.hero-h1 .line1{color:var(--white)}
.hero-h1 .line2{color:var(--orange)}
.hero-h1 .line3{color:transparent;-webkit-text-stroke:1px rgba(255,107,26,.35)}
.hero-sub{font-size:17px;font-weight:300;color:var(--muted);margin:24px 0 40px;line-height:1.7;animation:fadeUp .7s .2s ease both;max-width:500px}
.hero-sub strong{color:var(--white);font-weight:500}
.hero-btns{display:flex;flex-wrap:wrap;gap:14px;animation:fadeUp .7s .3s ease both}
.hbtn{display:inline-flex;align-items:center;gap:10px;padding:16px 28px;border-radius:4px;font-weight:700;font-size:14px;letter-spacing:.5px;transition:all .3s;white-space:nowrap}
.hbtn-call{background:var(--orange);color:#fff}
.hbtn-call:hover{background:var(--orange2);transform:translateY(-2px);box-shadow:0 10px 35px var(--orange-glow)}
.hbtn-wa{background:rgba(37,211,102,.12);color:var(--wa);border:1px solid rgba(37,211,102,.22)}
.hbtn-wa:hover{background:rgba(37,211,102,.2);transform:translateY(-2px)}
.hbtn-vi{background:rgba(115,96,242,.12);color:var(--vi);border:1px solid rgba(115,96,242,.22)}
.hbtn-vi:hover{background:rgba(115,96,242,.2);transform:translateY(-2px)}
.hbtn-tg{background:rgba(41,168,235,.12);color:var(--tg);border:1px solid rgba(41,168,235,.22)}
.hbtn-tg:hover{background:rgba(41,168,235,.2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(41,168,235,.15)}
.hbtn-ig{background:rgba(225,48,108,.1);color:#e1306c;border:1px solid rgba(225,48,108,.2)}
.hbtn-ig:hover{background:rgba(225,48,108,.18);transform:translateY(-2px)}
.hero-badge-row{display:flex;gap:32px;margin-top:56px;animation:fadeUp .7s .45s ease both;flex-wrap:wrap}
.hero-badge{text-align:center}
.hero-badge-num{font-family:'Oswald',sans-serif;font-size:42px;font-weight:700;color:var(--orange);line-height:1}
.hero-badge-txt{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.hero-divider{width:1px;background:var(--border);align-self:stretch}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* ─── MARQUEE ─── */
.marquee{background:var(--orange);overflow:hidden;padding:13px 0}
.marquee-track{display:inline-flex;animation:marq 18s linear infinite;white-space:nowrap}
.marquee-item{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#fff;padding:0 36px}
.marquee-dot{opacity:.4}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ─── SECTIONS ─── */
section{padding:90px 5%}
.s-label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--orange);margin-bottom:14px}
.s-title{font-family:'Oswald',sans-serif;font-size:clamp(36px,4.5vw,62px);line-height:1;font-weight:700;letter-spacing:.5px;color:var(--white)}
.s-desc{font-size:15px;color:var(--muted);line-height:1.7;font-weight:300;max-width:500px;margin-top:14px}

/* ─── TAMBUR BLOCK ─── */
.tambur{background:var(--dark2)}
.tambur-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.tambur-visual{position:relative;border-radius:6px;overflow:hidden;min-height:480px;background:var(--dark3);display:flex;align-items:center;justify-content:center}
.tambur-visual::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,26,.06),transparent 60%)}
.tambur-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:40px}
.tambur-svg{opacity:.12;position:absolute;inset:0;width:100%;height:100%}
.tambur-photo-placeholder{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:1}
.tambur-photo-placeholder .big-icon{font-size:80px}
.tambur-photo-placeholder p{font-size:13px;color:var(--muted);text-align:center}
.tambur-badge{position:absolute;top:24px;left:24px;background:var(--orange);color:#fff;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;padding:8px 18px;border-radius:3px;text-transform:uppercase}
.tambur-text{padding:20px 0}
.tambur-text .s-title{margin-bottom:20px}
.tambur-features{display:flex;flex-direction:column;gap:16px;margin:28px 0 36px}
.tf{display:flex;align-items:center;gap:14px;font-size:15px;color:var(--white);font-weight:400}
.tf-icon{width:40px;height:40px;background:var(--orange-glow);border:1px solid rgba(255,107,26,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ─── SERVICES ─── */
.services{background:var(--dark)}
.services-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:52px;flex-wrap:wrap;gap:24px}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.svc-card{background:var(--dark2);padding:40px 32px;position:relative;overflow:hidden;transition:all .35s;cursor:default}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--orange);transform:scaleX(0);transition:transform .4s;transform-origin:left}
.svc-card:hover::after{transform:scaleX(1)}
.svc-card:hover{background:var(--dark3)}
.svc-num{font-family:'Oswald',sans-serif;font-size:64px;color:rgba(255,107,26,.05);position:absolute;top:16px;right:20px;line-height:1;transition:color .4s}
.svc-card:hover .svc-num{color:rgba(255,107,26,.09)}
.svc-icon{width:52px;height:52px;border:1px solid rgba(255,107,26,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:24px;transition:all .35s}
.svc-card:hover .svc-icon{background:var(--orange);border-color:var(--orange)}
.svc-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;color:var(--white);letter-spacing:.5px;margin-bottom:10px}
.svc-desc{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300;margin-bottom:20px}
.svc-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);transition:gap .3s}
.svc-btn:hover{gap:12px}

/* ─── WHY ─── */
.why{background:var(--dark2)}
.why-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-top:56px}
.why-item{background:var(--dark3);padding:36px 28px;text-align:center;transition:background .3s;position:relative;overflow:hidden}
.why-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--orange),transparent);transform:scaleX(0);transition:transform .4s}
.why-item:hover::before{transform:scaleX(1)}
.why-item:hover{background:var(--dark4)}
.why-icon{font-size:36px;margin-bottom:16px}
.why-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--white);margin-bottom:8px;letter-spacing:.5px}
.why-text{font-size:12px;color:var(--muted);line-height:1.6;font-weight:300}

/* ─── INSTAGRAM ─── */
.instagram{background:var(--dark)}
.ig-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;flex-wrap:wrap;gap:20px}
.ig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.ig-item{aspect-ratio:1;background:var(--dark2);position:relative;overflow:hidden;cursor:pointer}
.ig-item-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.ig-item:hover .ig-item-inner{transform:scale(1.07)}
.ig-overlay{position:absolute;inset:0;background:rgba(255,107,26,.0);transition:background .3s;display:flex;align-items:center;justify-content:center}
.ig-item:hover .ig-overlay{background:rgba(255,107,26,.12)}
.ig-icon{font-size:28px;opacity:.08;transition:opacity .3s}
.ig-item:hover .ig-icon{opacity:.25}
.ig-gradient{position:absolute;inset:0}
.ig1{background:linear-gradient(135deg,#1a1c24,#222630)}
.ig2{background:linear-gradient(135deg,#181b22,#1f2230)}
.ig3{background:linear-gradient(135deg,#1c1e28,#232535)}
.ig4{background:linear-gradient(135deg,#171920,#1e202c)}
.ig5{background:linear-gradient(135deg,#1a1d28,#20232f)}
.ig6{background:linear-gradient(135deg,#16192,#1b1e28)}
.ig7{background:linear-gradient(135deg,#181a22,#21242e)}
.ig8{background:linear-gradient(135deg,#15171f,#1c1f2a)}
.ig-btn-wrap{text-align:center;margin-top:36px}

/* ─── PROCESS ─── */
.process{background:var(--dark2)}
.process-steps{display:grid;grid-template-columns:repeat(4,1fr);margin-top:56px;position:relative}
.process-steps::after{content:'';position:absolute;top:36px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(to right,transparent,rgba(255,107,26,.2),rgba(255,107,26,.2),transparent)}
.proc-step{padding:0 20px;text-align:center}
.proc-dot{width:72px;height:72px;border:1px solid rgba(255,107,26,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;background:var(--dark2);position:relative;z-index:1;transition:all .3s}
.proc-step:hover .proc-dot{border-color:var(--orange);box-shadow:0 0 32px var(--orange-glow)}
.proc-num{font-family:'Oswald',sans-serif;font-size:22px;color:var(--orange)}
.proc-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--white);margin-bottom:10px;letter-spacing:.5px}
.proc-desc{font-size:13px;color:var(--muted);line-height:1.6;font-weight:300}

/* ─── CONTACT ─── */
.contact{background:var(--dark)}
.contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.contact-cards{display:flex;flex-direction:column;gap:16px}
.c-card{background:var(--dark2);padding:24px 28px;border-radius:4px;border-left:2px solid var(--orange);display:flex;align-items:flex-start;gap:18px;transition:all .3s}
.c-card:hover{background:var(--dark3);transform:translateX(5px)}
.c-card-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.c-card-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:5px}
.c-card-val{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;color:var(--white);letter-spacing:.5px}
.c-card-sub{font-size:12px;color:var(--muted);margin-top:3px}
.contact-form-box{background:var(--dark2);padding:44px;border-radius:6px;position:relative;overflow:hidden}
.contact-form-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,var(--orange) 30%,var(--orange) 70%,transparent)}
.form-title{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:var(--white);margin-bottom:8px;letter-spacing:.5px}
.form-title span{color:var(--orange)}
.form-sub{font-size:13px;color:var(--muted);margin-bottom:28px;font-weight:300}
.form-group{margin-bottom:16px}
.form-input{width:100%;background:var(--dark3);border:1px solid var(--border);color:var(--white);font-family:'Inter',sans-serif;font-size:15px;padding:15px 18px;border-radius:4px;outline:none;transition:border-color .3s}
.form-input::placeholder{color:var(--muted2)}
.form-input:focus{border-color:var(--orange)}
.form-submit{width:100%;background:var(--orange);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;padding:17px;border-radius:4px;border:none;cursor:pointer;letter-spacing:.5px;transition:all .3s;margin-top:4px}
.form-submit:hover{background:var(--orange2);transform:translateY(-2px);box-shadow:0 10px 30px var(--orange-glow)}
.contact-messengers{display:flex;gap:12px;margin-top:16px}
.cm-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:4px;font-weight:700;font-size:13px;transition:all .3s}
.cm-wa{background:rgba(37,211,102,.1);color:var(--wa);border:1px solid rgba(37,211,102,.2)}
.cm-wa:hover{background:rgba(37,211,102,.18);transform:translateY(-2px)}
.cm-vi{background:rgba(115,96,242,.1);color:var(--vi);border:1px solid rgba(115,96,242,.2)}
.cm-vi:hover{background:rgba(115,96,242,.18);transform:translateY(-2px)}
.cm-tg{background:rgba(41,168,235,.1);color:var(--tg);border:1px solid rgba(41,168,235,.2)}
.cm-tg:hover{background:rgba(41,168,235,.18);transform:translateY(-2px)}

/* ─── MAP ─── */
.mapblock{background:var(--dark2);padding:0}
.map-inner{position:relative}
.map-frame{width:100%;height:420px;border:none;filter:grayscale(80%) brightness(.7) contrast(1.1);display:block}
.map-overlay{position:absolute;top:40px;left:5%;background:var(--dark);padding:32px;border-radius:6px;border-top:2px solid var(--orange);max-width:320px;z-index:2}
.map-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:var(--white);margin-bottom:12px;letter-spacing:.5px}
.map-info{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.map-call-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--orange);color:#fff;font-weight:700;font-size:14px;padding:14px 24px;border-radius:4px;transition:all .3s;text-align:center}
.map-call-btn:hover{background:var(--orange2);transform:translateY(-2px)}

/* ─── FOOTER ─── */
footer{background:var(--dark);border-top:1px solid var(--border);padding:44px 5%}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px}
.footer-logo{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;letter-spacing:3px;color:var(--orange)}
.footer-logo span{color:var(--white);font-weight:400}
.footer-tagline{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.footer-links{display:flex;gap:28px;flex-wrap:wrap}
.footer-links a{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color .25s}
.footer-links a:hover{color:var(--orange)}
.footer-copy{font-size:12px;color:var(--muted2)}

/* ─── STICKY BUTTONS ─── */
.sticky-btns{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;gap:12px;z-index:400}
.sticky-btn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:all .3s;cursor:pointer}
.sticky-btn:hover{transform:scale(1.12) translateY(-2px)}
.sticky-call{background:var(--orange)}
.sticky-wa{background:var(--wa)}
.sticky-vi{background:var(--vi)}
.sticky-tg{background:var(--tg)}
.sticky-tooltip{position:absolute;right:70px;background:var(--dark);color:var(--white);font-size:12px;font-weight:600;padding:6px 12px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .25s;box-shadow:0 4px 14px rgba(0,0,0,.4);border:1px solid var(--border)}
.sticky-btn-wrap{position:relative;display:flex;align-items:center}
.sticky-btn-wrap:hover .sticky-tooltip{opacity:1}

/* ─── AI CHAT ─── */
.chat-bubble{position:fixed;bottom:28px;left:28px;z-index:400;cursor:pointer}
.chat-trigger{width:60px;height:60px;background:linear-gradient(135deg,var(--orange),#FF8C42);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 24px var(--orange-glow);transition:transform .3s;animation:chatBounce 3s ease-in-out infinite}
.chat-trigger:hover{transform:scale(1.1)}
@keyframes chatBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.chat-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:#f44;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:2px solid var(--dark)}
.chat-window{position:fixed;bottom:104px;left:28px;width:320px;background:var(--dark2);border-radius:16px 16px 4px 16px;box-shado
